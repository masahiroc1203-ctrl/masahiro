version: '3.8'

services:
  db:
    image: postgres:15
    container_name: expense_db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: expense
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    command: >
      postgres -c shared_buffers=256MB
               -c work_mem=32MB
               -c maintenance_work_mem=128MB
               -c max_wal_size=1GB
               -c wal_buffers=16MB

volumes:
  db_data:
